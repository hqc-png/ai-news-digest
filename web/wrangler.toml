name = "ai-news-digest"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# D1 数据库绑定（本地开发）
[[d1_databases]]
binding = "DB"
database_name = "ai-digest"
database_id = "local-db-id"  # 本地开发时可以是任意值
preview_database_id = "local-db-id"

# Cron Triggers（定时任务）
[triggers]
crons = ["0 9 * * *"]  # 每天 9:00 AM UTC

# 环境变量
[vars]
ENVIRONMENT = "development"
